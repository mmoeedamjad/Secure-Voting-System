<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cast Ballot | SecureVote</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      .ballot-options {
        margin: 1.5rem 0;
      }
      .radio-card {
        background: rgba(255, 255, 255, 0.05);
        margin-bottom: 0.75rem;
        padding: 1.25rem;
        border-radius: 12px;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        transition:
          transform 0.2s ease,
          background 0.2s ease;
      }
      .radio-card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-2px);
      }
      .radio-card input {
        margin-right: 1rem;
        width: 1.2rem;
        height: 1.2rem;
        cursor: pointer;
        accent-color: var(--primary-color);
      }
      .footer-note {
        text-align: center;
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Secure Ballot</h1>
      <h2 style="color: var(--primary-color); margin-bottom: 2rem">
        {{ question }}
      </h2>

      <form method="post">
        <div class="ballot-options">
          {% for option in options %}
          <label class="radio-card" for="opt-{{ loop.index }}">
            <input
              type="radio"
              name="vote_option"
              value="{{ option }}"
              id="opt-{{ loop.index }}"
              required
            />
            <span>{{ option }}</span>
          </label>
          {% endfor %}
        </div>

        <button type="submit">Encrypt & Cast Vote</button>
      </form>

      <p class="footer-note">
        Your vote is protected with end-to-end encryption.
      </p>
    </div>
  </body>
</html>
