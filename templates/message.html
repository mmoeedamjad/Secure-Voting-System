<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Notification | SecureVote</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
      .message-content {
        text-align: center;
        padding: 2rem 0;
      }
      .status-indicator {
        color: var(--success);
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .message-body {
        color: var(--text-muted);
        margin-bottom: 2.5rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="message-content">
        <div class="status-indicator">Confirmed</div>
        <h1>{{ title }}</h1>
        <p class="message-body">{{ message }}</p>

        <a href="{{ redirect_url }}" style="text-decoration: none">
          <button type="button">Proceed</button>
        </a>
      </div>
    </div>
  </body>
</html>
