<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Election | SecureVote</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Election Setup</h1>
      <h2>Define Ballot Parameters</h2>

      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="success">{{ messages[0] }}</div>
      {% endif %} {% endwith %}

      <form method="post">
        <div class="form-group">
          <label>Ballot Question</label>
          <input
            type="text"
            name="question"
            placeholder="e.g. Project Leader Selection"
            required
          />
        </div>

        <div class="form-group">
          <label>Option Alpha</label>
          <input type="text" name="option1" required />
        </div>

        <div class="form-group">
          <label>Option Beta</label>
          <input type="text" name="option2" required />
        </div>

        <div class="form-group">
          <label>Option Gamma (Optional)</label>
          <input type="text" name="option3" />
        </div>

        <button type="submit">Initialize Election</button>
      </form>

      <div class="menu">
        <a href="/admin">Return to Panel</a>
      </div>
    </div>
  </body>
</html>
